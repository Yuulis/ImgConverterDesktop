name: Create Release Branch and PR

on:
    workflow_dispatch:
        inputs:
            version:
                description: 'Version to release'
                required: true

jobs:
    create-PR:
        runs-on: ubuntu-latest
        env:
            RELEASE_BRANCH_NAME: release/v${{ github.event.inputs.version }}
        steps:
            - name: Checkout Repository
              uses: actions/checkout@v4
            
            - name: Setup Ruby
              uses: actions/setup-ruby@v1
              with:
                  ruby-version: 3.1

            - name: Create and Push Release Branch
              run: |
                  git checkout -b ${{ env.RELEASE_BRANCH_NAME }}
                  git push origin ${{ env.RELEASE_BRANCH_NAME }}
            
            - name: Install git-pr-release
              run: gem install --no-document git-pr-release

            - name: Create PR for Release
              run: git-pr-release --squash
              env:
                GIT_PR_RELEASE_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                GIT_PR_RELESE_BRANCH_PRODUCTION: main
                GIT_PR_RELEASE_BRANCH_STAName: ${{ env.RELEASE_BRANCH_NAME }}
                GIT_PR_RELEASE_LABELS: release
                GIT_PR_RELEASE_TEMPLATE: pr-release.template.erb
                TZ: Asia/Tokyo